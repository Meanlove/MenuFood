<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indigenous Food & Coffee</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Poppins', sans-serif; background:#f5f4f0; color:#1a1a2e; max-width:430px; margin:0 auto; }

/* ── HERO SECTION ── */
.hero {
  position: relative;
  width: 100%;
  height: 300px;
  background-image: url('https://i.pinimg.com/1200x/53/0a/8a/530a8a2fc5335529bb1186b1a7490331.jpg');
  background-size: cover;
  background-position: center;
  border-radius: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-overlay {
  background: rgba(0,0,0,0.4);
  width: 100%;
  height: 100%;
  border-radius:16px;
  display:flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding:0 16px;
}

.hero-title {
  font-family: 'Poppins', sans-serif;
  font-size:28px;
  color:#fff;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:12px;
}

.hero-subtitle {
  font-family: 'Noto Sans Khmer', sans-serif;
  font-size:20px;
  color:#fff;
  font-weight:500;
  line-height:1.4;
}

/* ── HEADER ── */
.header {
  background:#1a1a2e;
  padding:12px 16px;
  position: sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:16px 16px 0 0;
}
.cart-btn {
  background:#e94560;
  border:none;
  border-radius:24px;
  color:#fff;
  font-size:13px;
  font-weight:500;
  padding:8px 16px;
  cursor:pointer;
}
.cart-count {
  background:#fff;
  color:#e94560;
  border-radius:50%;
  width:20px; height:20px;
  font-size:11px;
  font-weight:700;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

/* ── MENU ── */
.menu-body { padding:16px; }
.item-card {
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.item-card img { width:60px; height:60px; border-radius:10px; object-fit:cover; }
.item-info { flex:1; }
.item-name { font-weight:600; font-size:16px; }
.item-price { font-weight:700; color:#e94560; margin-top:4px; }
.add-btn {
  background:#1a1a2e; color:#fff;
  border:none; border-radius:50%;
  width:34px; height:34px;
  font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ── CART OVERLAY ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4);
  display:none; align-items:flex-end; z-index:200;
}
.overlay.open { display:flex; }
.cart-sheet {
  background:#fff; border-radius:24px 24px 0 0;
  width:100%; max-height:90vh;
  display:flex; flex-direction:column;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
.sheet-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid rgba(0,0,0,0.08);}
.close-btn { background:#f5f4f0; border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; }

.cart-items { overflow-y:auto; flex:1; padding:16px 20px; }
.cart-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.08); }
.cart-row-info { flex:1; }
.cart-row-name { font-size:14px; font-weight:600; }
.cart-row-sub { font-size:12px; color:#6b7280; margin-top:2px; }
.cart-row-price { font-weight:700; color:#e94560; }

.cart-footer { padding:16px 20px 28px; }
.total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.total-label{ font-size:15px; color:#6b7280;}
.total-value{ font-size:20px; font-weight:700; color:#1a1a2e;}
.form-input { width:100%; padding:12px; border:1.5px solid rgba(0,0,0,0.08); border-radius:8px; font-size:15px; margin-top:6px; }
.order-btn { width:100%; background:#e94560; color:#fff; border:none; padding:15px; font-weight:700; cursor:pointer; margin-top:6px; }
.order-btn:disabled { opacity:0.5; cursor:default; }

/* ── SUCCESS SCREEN ── */
.success-overlay { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:#f5f4f0; z-index:300; text-align:center; padding:40px; }
.success-overlay.open { display:flex; }
.success-big { font-size:72px; margin-bottom:20px; }
.success-title { font-size:24px; font-weight:700; margin-bottom:10px; }
.success-sub { font-size:15px; color:#6b7280; line-height:1.7; max-width:280px; }
.new-order-btn { margin-top:32px; background:#1a1a2e; color:#fff; border:none; border-radius:14px; padding:14px 32px; cursor:pointer; }

/* ── RESPONSIVE ── */
@media (max-width:430px){
  body{padding:0 8px;}
  .hero-title{font-size:24px;}
  .hero-subtitle{font-size:16px;}
}
</style>
</head>
<body>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-overlay">
    <h1 class="hero-title">Welcome to Indigenous Food & Coffee</h1>
    <h2 class="hero-subtitle">ឃ្លានហើយមែនអត់? ហ្ចឹងកម្មង់ចាណាងញាំហូវ!</h2>
  </div>
</section>

<!-- HEADER -->
<div class="header">
  <div>Menu</div>
  <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
</div>

<!-- MENU -->
<div class="menu-body" id="menuBody"></div>

<!-- CART OVERLAY -->
<div class="overlay" id="cartOverlay" onclick="handleOverlayClick(event)">
  <div class="cart-sheet" id="cartSheet">
    <div class="sheet-header">
      <div>Your Order</div>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <input class="form-input" id="customerName" placeholder="Your Table">
      <input class="form-input" id="customerPhone" placeholder="Phone (optional)">
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-value" id="cartTotal">$0.00</span>
      </div>
      <button class="order-btn" onclick="placeOrder()">📲 Send Order</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</div>

<!-- SUCCESS SCREEN -->
<div class="success-overlay" id="successScreen">
  <div class="success-big">🎉</div>
  <div class="success-title">អ្នកបានធ្វើការកម្មង់រួចរាល់ហើយ!</div>
  <div class="success-title">សូមចាំ 2 ភ្លេតសិនណា🥹🥹!</div>
  <div class="success-sub">Your order was sent via Telegram.<br>We'll start preparing it right away!</div>
  <button class="new-order-btn" onclick="resetOrder()">តោះ គម្មង់ថែមទៀត😋</button>
</div>

<script>
// ── TELEGRAM BOT ──
const TELEGRAM_BOT_TOKEN = "8445527600:AAGVXX3d4Q7dcu_TfwqMzsfYci3oun1fvbY";
const TELEGRAM_CHAT_IDS = ["6040423224","5427036666"]; // add more chat IDs here

// ── MENU DATA API-LIKE
const menuData = [
  { id:1, name:"ចាណាង សាច់គោ", price:3, image:"https://i.pinimg.com/1200x/53/0a/8a/530a8a2fc5335529bb1186b1a7490331.jpg" },
  { id:2, name:"ចាណាង សាច់ជ្រូក", price:3, image:"https://i.pinimg.com/1200x/53/0a/8a/530a8a2fc5335529bb1186b1a7490331.jpg" },
  { id:3, name:"ឡាបសាច់ជ្រូក", price:3, image:"https://i.pinimg.com/1200x/53/0a/8a/530a8a2fc5335529bb1186b1a7490331.jpg" },
  { id:4, name:"សាច់ក្រក់", price:3, image:"https://i.pinimg.com/1200x/53/0a/8a/530a8a2fc5335529bb1186b1a7490331.jpg" }
];

let cart={};

// ── RENDER MENU
function renderMenu(){
  const body=document.getElementById("menuBody");
  body.innerHTML="";
  menuData.forEach(item=>{
    const qty=cart[item.id]||0;
    const card=document.createElement("div");
    card.className="item-card";
    card.innerHTML=`
      <img src="${item.image}" alt="${item.name}">
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">$${item.price.toFixed(2)}</div>
      </div>
      ${qty===0?`<button class="add-btn" onclick="addItem(${item.id})">+</button>`:
      `<div><button onclick="removeItem(${item.id})">−</button> <span>${qty}</span> <button onclick="addItem(${item.id})">+</button></div>`}`;
    body.appendChild(card);
  });
}

// ── CART FUNCTIONS
function addItem(id){ cart[id]=(cart[id]||0)+1; updateCartCount(); renderMenu(); }
function removeItem(id){ if(cart[id]>1) cart[id]--; else delete cart[id]; updateCartCount(); renderMenu(); }
function updateCartCount(){ document.getElementById("cartCount").textContent=Object.values(cart).reduce((a,b)=>a+b,0); }

function openCart(){ renderCartSheet(); document.getElementById("cartOverlay").classList.add("open"); }
function closeCart(){ document.getElementById("cartOverlay").classList.remove("open"); }
function handleOverlayClick(e){ if(e.target===document.getElementById("cartOverlay")) closeCart(); }

function renderCartSheet(){
  const keys=Object.keys(cart);
  const itemsEl=document.getElementById("cartItems");
  if(keys.length===0){ itemsEl.innerHTML="<div>Your cart is empty</div>"; document.getElementById("cartTotal").textContent="$0.00"; return; }
  let total=0; itemsEl.innerHTML="";
  keys.forEach(id=>{
    const item=menuData.find(m=>m.id==id);
    const qty=cart[id]; const sub=item.price*qty; total+=sub;
    const row=document.createElement("div"); row.className="cart-row";
    row.innerHTML=`<img src="${item.image}" style="width:40px;height:40px;border-radius:8px;">
      <div class="cart-row-info"><div class="cart-row-name">${item.name}</div><div class="cart-row-sub">x${qty} @ $${item.price.toFixed(2)}</div></div>
      <div class="cart-row-price">$${sub.toFixed(2)}</div>`;
    itemsEl.appendChild(row);
  });
  document.getElementById("cartTotal").textContent="$"+total.toFixed(2);
}

// ── SEND MESSAGE TO MULTIPLE USERS
async function sendTelegramMessage(message){
  for(const chatId of TELEGRAM_CHAT_IDS){
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: "Markdown" })
    });
  }
}

// ── PLACE ORDER
async function placeOrder(){
  const name=document.getElementById("customerName").value.trim();
  const phone=document.getElementById("customerPhone").value.trim();
  if(!name){ alert("Enter name/table"); return; }
  if(Object.keys(cart).length===0){ alert("Cart empty"); return; }

  const lines=Object.keys(cart).map(id=>{
    const item=menuData.find(m=>m.id==id);
    return `• ${item.name} x${cart[id]} → $${(item.price*cart[id]).toFixed(2)}`;
  });
  const total=Object.keys(cart).reduce((acc,id)=>{ const item=menuData.find(m=>m.id==id); return acc+item.price*cart[id]; },0);
  const now=new Date();
  const message=`🍽️ *NEW ORDER*\n━━━━━━━━━\n🪑 *Table:* ${name}\n${phone?`📞 *Phone:* ${phone}\n`:''}🕐 *Time:* ${now.toLocaleTimeString()}, ${now.toLocaleDateString()}\n━━━━━━━━━\n${lines.join("\n")}\n━━━━━━━━━\n💰 *Total: $${total.toFixed(2)}*`;

  try{
    await sendTelegramMessage(message);
    closeCart(); 
    document.getElementById("successScreen").classList.add("open"); 
    cart={}; 
    updateCartCount(); 
    renderMenu();
  }catch(err){
    const status=document.getElementById("statusMsg");
    status.className="status-msg error"; status.textContent="❌ "+err.message;
  }
}

function resetOrder(){ 
  cart={}; 
  document.getElementById("successScreen").classList.remove("open"); 
  document.getElementById("customerName").value=""; 
  document.getElementById("customerPhone").value=""; 
  renderMenu(); 
  updateCartCount(); 
}

// ── INITIAL RENDER
renderMenu();
</script>
</body>
</html>
